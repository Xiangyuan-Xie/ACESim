repos:
  - repo: local
    hooks:
      - id: conventional-commit-message
        name: Conventional Commit message
        entry: python scripts/check_commit_msg.py
        language: system
        stages: [commit-msg]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/pycqa/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args: [
          --in-place,
          --remove-all-unused-imports,
          --remove-unused-variables,
          --recursive
        ]
        exclude: '^(docs/|.*\.md$)'

  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length=120", "--atomic"]
        additional_dependencies: ["isort[pyproject]"]

  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        entry: scripts/black_each_file.py
        args: [
          --line-length=120,
          --safe
        ]

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        exclude: '^(acetele/equipment/feetech/feetech_sdk/.*)'
        args:
          - --max-line-length=120
          - --extend-ignore=E203

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        name: Type checking
        entry: mypy
        args: [
          "--ignore-missing-imports",
          "--explicit-package-bases",
          "--show-error-codes",
        ]
        additional_dependencies: [
          "types-requests",
          "types-setuptools",
          "types-PyYAML"
        ]
        language: python
        types: [ python ]
