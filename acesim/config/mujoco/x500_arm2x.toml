[params]
rotor_direction = [1.0, 1.0, -1.0, -1.0]
motor_constant = 1.22949e-05
moment_constant = 0.0140363
rotor_drag_coeff = 8.06428e-05
rolling_moment_coeff = 1e-06
time_constant_up = 0.0125
time_constant_down = 0.025
max_rot_velocity = 1032.2
rotor_radius = 0.127
arm_motion_max_velocity = 1.0

[params.lumped_drag]
enabled = true
units = "mass_normalized"
D = [0.20, 0.20, 0.00]

[params.rotor_flow]
enabled = true
advance_c_lambda = 0.0
advance_c_mu = 0.0
advance_scale_min = 0.85
advance_scale_max = 1.10
ground_effect_enabled = true
ground_effect_max_scale = 1.25
ground_effect_height_rotor_diameters = 1.0
ground_effect_normal_min_dot = 0.5

[params.downwash]
enabled = true
exclude_body_patterns = ["base_link", "rotor_*", "*_vis"]
drag_coefficient = 1.1
area_scale = 1.0
wake_speed_scale = 1.0
wake_spread_angle_rad = 0.20
axial_decay_m = 0.45

[params.arm.delay]
joint_state_delay_ms = [0.0, 0.0]

[params.px4_fusion]
mode = "mocap"

[params.px4_fusion.hil]
hil_sensor_rate_hz = 200.0
mag_rate_hz = 84.0
baro_rate_hz = 42.0
gps_rate_hz = 5.0

[params.px4_fusion.mocap]
hil_sensor_rate_hz = 200.0
vision_rate_hz = 100.0
ekf2_ev_ctrl = 11
ekf2_hgt_ref = "Vision"
ekf2_ev_delay_ms = 0.0
ekf2_ev_pos_body_m = [0.0, 0.0, 0.0]
ekf2_ev_noise_md = 1
ekf2_evp_noise = 0.003
ekf2_evv_noise = 0.01
ekf2_eva_noise = 0.01
ekf2_gps_ctrl = 0
ekf2_mag_type = 0

[params.px4_fusion.delay]
hil_sensor_delay_ms = [0.0, 0.0]
vision_delay_ms = [0.0, 0.0]
actuator_delay_ms = [0.0, 0.0]

[params.visual_stream]
enabled = true
rate_hz = 120.0
zmq_endpoint = "tcp://0.0.0.0:5601"
