[params]
rotor_direction = [1.0, 1.0, -1.0, -1.0]
motor_constant = 9.810964962061632e-06
moment_constant = 0.027091347106075237
rotor_drag_coeff = 6.0e-05
rolling_moment_coeff = 6.0e-07
time_constant_up = 0.0125
time_constant_down = 0.025
max_rot_velocity = 1554.8789240167084
rotor_radius = 0.1016
arm_motion_max_velocity = 1.0

[params.throttle_to_omega]
coefficients = [0.0, 1.755537447080606, -0.7549872697502744]

[params.lumped_drag]
enabled = true
units = "mass_normalized"
D = [0.20, 0.20, 0.00]

[params.rotor_flow]
enabled = true
advance_c_lambda = 0.0
advance_c_mu = 0.0
advance_scale_min = 0.85
advance_scale_max = 1.10
ground_effect_enabled = true
ground_effect_max_scale = 1.25
ground_effect_height_rotor_diameters = 1.0
ground_effect_normal_min_dot = 0.5

[params.downwash]
enabled = true
exclude_body_patterns = ["base_link", "rotor_*", "*_vis"]
drag_coefficient = 1.1
area_scale = 1.0
wake_speed_scale = 1.0
wake_spread_angle_rad = 0.20
axial_decay_m = 0.45

[params.arm.delay]
joint_state_delay_ms = [0.0, 0.0]

[params.px4_fusion]
mode = "mocap"

[params.px4_fusion.hil]
hil_sensor_rate_hz = 200.0
mag_rate_hz = 84.0
baro_rate_hz = 42.0
gps_rate_hz = 5.0

[params.px4_fusion.mocap]
hil_sensor_rate_hz = 200.0
vision_rate_hz = 100.0
ekf2_ev_ctrl = 11
ekf2_hgt_ref = "Vision"
ekf2_ev_delay_ms = 0.0
ekf2_ev_pos_body_m = [0.0, 0.0, 0.0]
ekf2_ev_noise_md = 1
ekf2_evp_noise = 0.003
ekf2_evv_noise = 0.01
ekf2_eva_noise = 0.01
ekf2_gps_ctrl = 0
ekf2_mag_type = 0

[params.px4_fusion.delay]
hil_sensor_delay_ms = [0.0, 0.0]
vision_delay_ms = [0.0, 0.0]
actuator_delay_ms = [0.0, 0.0]

[params.px4_fusion.raw_noise]
accel_std_mps2 = [0.889, 0.753, 0.673]
gyro_std_radps = [0.260, 0.043, 0.050]
mag_std_gauss = [0.0022, 0.0083, 0.0049]
baro_altitude_std_m = 0.235
gps_position_std_m = 0.0
gps_velocity_std_mps = 0.0
vision_position_std_m = [0.00015, 0.00030, 0.00030]
vision_orientation_std_rad = 0.0006

[params.control_stream]
enabled = true
max_channels = 8
zmq_endpoint = "tcp://0.0.0.0:5602"

[params.arm_command_stream]
enabled = true
zmq_endpoint = "tcp://0.0.0.0:5604"
joint_names = ["joint_1", "joint_2", "joint_3", "joint_4", "joint_5"]
gripper_joint_names = ["joint_gripper_left", "joint_gripper_right"]

[params.visual_stream]
enabled = true
rate_hz = 120.0
zmq_endpoint = "tcp://0.0.0.0:5601"

[params.truth_stream]
enabled = true
rate_hz = 120.0
zmq_endpoint = "tcp://0.0.0.0:5605"
