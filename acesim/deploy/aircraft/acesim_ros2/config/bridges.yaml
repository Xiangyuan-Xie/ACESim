bridges:
  simulation_clock:
    enabled: true
    poll_period_sec: 0.001
    transport:
      type: zmq_sub
      endpoint: tcp://127.0.0.1:5600
    topic: /acesim/clock
  arm_state:
    enabled: true
    poll_period_sec: 0.001
    transport:
      type: zmq_sub
      endpoint: tcp://127.0.0.1:5603
    topic: /fmu/in/arm_joint_state
